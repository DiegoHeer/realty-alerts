repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-toml
      - id: check-yaml
        args: [--allow-multiple-documents]
      - id: end-of-file-fixer
      - id: trailing-whitespace

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff-check
        name: Lint python (scraper)
        args: [--config, ./services/scraper/pyproject.toml, --fix, --exit-non-zero-on-fix]
        files: ^services/scraper/
      - id: ruff-check
        name: Lint python (api)
        args: [--config, ./services/api/pyproject.toml, --fix, --exit-non-zero-on-fix]
        files: ^services/api/
      - id: ruff-format
        name: Format python (scraper)
        args: [--config, ./services/scraper/pyproject.toml]
        files: ^services/scraper/
      - id: ruff-format
        name: Format python (api)
        args: [--config, ./services/api/pyproject.toml]
        files: ^services/api/

  - repo: local
    hooks:
      - id: ty-check-scraper
        name: Typecheck python (scraper)
        language: system
        entry: bash -c 'cd services/scraper && uv run ty check'
        files: ^services/scraper/.*\.py$
        pass_filenames: false
        require_serial: true
      - id: ty-check-api
        name: Typecheck python (api)
        language: system
        entry: bash -c 'cd services/api && uv run ty check'
        files: ^services/api/.*\.py$
        pass_filenames: false
        require_serial: true
      - id: eslint-web
        name: Lint TS (web)
        language: system
        entry: bash -c 'cd apps/web && ./node_modules/.bin/eslint --max-warnings=0 .'
        files: ^apps/web/.*\.(ts|tsx|js|jsx|mjs|cjs)$
        pass_filenames: false
        require_serial: true
      - id: eslint-mobile
        name: Lint TS (mobile)
        language: system
        entry: bash -c 'cd apps/mobile && ./node_modules/.bin/eslint --max-warnings=0 .'
        files: ^apps/mobile/.*\.(ts|tsx|js|jsx|mjs|cjs)$
        pass_filenames: false
        require_serial: true
      - id: playwright-version-sync
        name: Playwright client/server version match
        language: system
        entry: bash scripts/check-playwright-version.sh
        files: ^(services/scraper/uv\.lock|docker-compose\.dev\.yml)$
        pass_filenames: false
        require_serial: true
