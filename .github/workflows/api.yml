name: API CI
on:
  push:
    paths: ["services/api/**"]
    branches: [main]
  pull_request:
    paths: ["services/api/**"]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: cd services/api && uv sync --dev
      - run: cd services/api && uv run ruff check src/ tests/
      - run: cd services/api && uv run ruff format --check src/ tests/

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17.6-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test_realty_alerts
        ports: ["5432:5432"]
        options: >-
          --health-cmd="pg_isready -U test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: cd services/api && uv sync --dev
      - run: cd services/api && uv run pytest tests/ -v
        env:
          API_DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/test_realty_alerts
          API_INTERNAL_API_KEY: test-key

  build:
    needs: [lint, test]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: services/api
          push: true
          tags: |
            ghcr.io/diegoheer/realty-api:${{ github.sha }}
            ghcr.io/diegoheer/realty-api:latest
