name: API CI
on:
  push:
    paths: ["services/api/**"]
    branches: [main]
  pull_request:
    paths: ["services/api/**"]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: cd services/api && uv sync --dev

      - name: Lint with ruff
        run: cd services/api && uv run ruff check realty_api/ scraping/ tests/

      - name: Check formatting
        run: cd services/api && uv run ruff format --check realty_api/ scraping/ tests/

      - name: Type-check with ty
        run: cd services/api && uv run ty check realty_api/ scraping/ tests/

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17.6-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test_realty_alerts
        ports: ["5432:5432"]
        options: >-
          --health-cmd="pg_isready -U test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: cd services/api && uv sync --dev

      - name: Run tests
        run: cd services/api && uv run pytest tests/ -v --ds=realty_api.settings.ci
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test_realty_alerts
          REALTY_API_KEY: test-key
          DJANGO_SECRET_KEY: ${{ secrets.DJANGO_SECRET_KEY }}

  build:
    needs: [lint, test]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      deployments: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build and push image
        id: docker
        uses: ./.github/actions/docker-build-push
        with:
          context: services/api
          image-name: api

      - name: Set preview URL
        if: github.event_name == 'pull_request'
        uses: ./.github/actions/preview-url
        with:
          app-name: api

      - name: Bump GitOps tags
        if: github.ref == 'refs/heads/main'
        uses: ./.github/actions/gitops-bump-tag
        with:
          app-name: api
          image-tag: ${{ steps.docker.outputs.image-tag }}
        env:
          APP_ID: ${{ secrets.APP_ID }}
          APP_PRIVATE_KEY: ${{ secrets.APP_PRIVATE_KEY }}

  scaffold:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Scaffold platform config
        uses: ./.github/actions/gitops-scaffold
        with:
          app-name: api
          port: "8000"
          health-path: /healthz
          memory-request: 128Mi
          memory-limit: 256Mi
          cpu-request: 50m
        env:
          APP_ID: ${{ secrets.APP_ID }}
          APP_PRIVATE_KEY: ${{ secrets.APP_PRIVATE_KEY }}
