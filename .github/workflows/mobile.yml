name: Mobile App CI
on:
  push:
    paths: ["apps/mobile/**"]
    branches: [main]
  pull_request:
    paths: ["apps/mobile/**"]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: cd apps/mobile && npm ci
      - name: Lint
        run: cd apps/mobile && npm run lint
      - name: Run tests
        run: cd apps/mobile && npm test
