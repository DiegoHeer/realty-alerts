name: Mobile App CI
on:
  push:
    paths: ["apps/mobile/**"]
    branches: [main]
  pull_request:
    paths: ["apps/mobile/**"]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: cd apps/mobile && npm ci
      - run: cd apps/mobile && npm run lint
      - run: cd apps/mobile && npm test
