name: Mobile App CI
on:
  push:
    paths: ["apps/mobile/**"]
    branches: [main]
  pull_request:
    paths: ["apps/mobile/**"]
  workflow_dispatch:
    inputs:
      profile:
        description: "EAS build profile"
        type: choice
        options: [preview, development]
        default: preview
      platform:
        description: "Target platform"
        type: choice
        options: [android, ios, all]
        default: android

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: cd apps/mobile && npm ci

      - name: Lint
        run: cd apps/mobile && npm run lint

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: cd apps/mobile && npm ci

      - name: Run tests
        run: cd apps/mobile && npm test

  eas-build:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: cd apps/mobile && npm ci

      - name: Trigger EAS build
        run: cd apps/mobile && npx eas build --profile ${{ inputs.profile }} --platform ${{ inputs.platform }} --non-interactive --no-wait
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
