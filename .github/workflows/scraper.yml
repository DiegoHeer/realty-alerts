name: Scraper CI
on:
  push:
    paths: ["services/scraper/**"]
    branches: [main]
  pull_request:
    paths: ["services/scraper/**"]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: cd services/scraper && uv sync --dev

      - name: Lint with ruff
        run: cd services/scraper && uv run ruff check src/ tests/

      - name: Check formatting
        run: cd services/scraper && uv run ruff format --check src/ tests/

      - name: Type-check with ty
        run: cd services/scraper && uv run ty check src/ tests/

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: cd services/scraper && uv sync --dev

      - name: Run tests
        run: cd services/scraper && uv run pytest tests/ -v

  build:
    needs: [lint, test]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Build and push scraper image
        uses: docker/build-push-action@v6
        with:
          context: services/scraper
          push: true
          tags: |
            ghcr.io/diegoheer/realty-scraper:${{ github.sha }}
            ghcr.io/diegoheer/realty-scraper:latest
