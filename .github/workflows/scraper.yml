name: Scraper CI
on:
  push:
    paths: ["services/scraper/**"]
    branches: [main]
  pull_request:
    paths: ["services/scraper/**"]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: cd services/scraper && uv sync --dev

      - name: Lint with ruff
        run: cd services/scraper && uv run ruff check src/ tests/

      - name: Check formatting
        run: cd services/scraper && uv run ruff format --check src/ tests/

      - name: Type-check with ty
        run: cd services/scraper && uv run ty check src/ tests/

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: cd services/scraper && uv sync --dev

      - name: Run tests
        run: cd services/scraper && uv run pytest tests/ -v

  build:
    needs: [lint, test]
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.docker.outputs.image-tag }}
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Build and push image
        id: docker
        uses: ./.github/actions/docker-build-push
        with:
          context: services/scraper
          image-name: scraper

  gitops-bump:
    needs: [build]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Bump GitOps tags
        uses: ./.github/actions/gitops-bump-tag
        with:
          app-name: scraper
          image-tag: ${{ needs.build.outputs.image-tag }}
        env:
          APP_ID: ${{ secrets.APP_ID }}
          APP_PRIVATE_KEY: ${{ secrets.APP_PRIVATE_KEY }}
