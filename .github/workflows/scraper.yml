name: Scraper CI
on:
  push:
    paths: ["services/scraper/**"]
    branches: [main]
  pull_request:
    paths: ["services/scraper/**"]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: cd services/scraper && uv sync --dev
      - run: cd services/scraper && uv run ruff check src/ tests/
      - run: cd services/scraper && uv run ruff format --check src/ tests/

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: cd services/scraper && uv sync --dev
      - run: cd services/scraper && uv run pytest tests/ -v

  build:
    needs: [lint, test]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: services/scraper
          push: true
          tags: |
            ghcr.io/diegoheer/realty-scraper:${{ github.sha }}
            ghcr.io/diegoheer/realty-scraper:latest
