name: Auto-label PRs for preview env
on:
  pull_request:
    types: [opened]
    paths:
      - "services/api/**"
      - "apps/web/**"

jobs:
  label:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Add preview label
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr edit ${{ github.event.pull_request.number }} \
            --repo ${{ github.repository }} \
            --add-label preview
