name: Web Landing Page CI
on:
  push:
    paths: ["apps/web/**"]
    branches: [main]
  pull_request:
    paths: ["apps/web/**"]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: cd apps/web && npm ci

      - name: Lint
        run: cd apps/web && npm run lint

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: cd apps/web && npm ci

      - name: Run tests
        run: cd apps/web && npm test

      - name: Build app
        run: cd apps/web && npm run build

  build:
    needs: [lint, test]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      deployments: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build and push image
        id: docker
        uses: ./.github/actions/docker-build-push
        with:
          context: apps/web
          image-name: web

      - name: Set preview URL
        if: github.event_name == 'pull_request'
        uses: ./.github/actions/preview-url
        with:
          app-name: web

      - name: Bump GitOps tags
        if: github.ref == 'refs/heads/main'
        uses: ./.github/actions/gitops-bump-tag
        with:
          app-name: web
          image-tag: ${{ steps.docker.outputs.image-tag }}
        env:
          APP_ID: ${{ secrets.APP_ID }}
          APP_PRIVATE_KEY: ${{ secrets.APP_PRIVATE_KEY }}

  scaffold:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Scaffold platform config
        uses: ./.github/actions/gitops-scaffold
        with:
          app-name: web
          memory-request: 32Mi
          memory-limit: 64Mi
          cpu-request: 10m
        env:
          APP_ID: ${{ secrets.APP_ID }}
          APP_PRIVATE_KEY: ${{ secrets.APP_PRIVATE_KEY }}
