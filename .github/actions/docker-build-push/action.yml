name: Docker Build & Push
description: Build and push a Docker image to ghcr.io

inputs:
  context:
    description: Path to the Docker build context (e.g. services/api)
    required: true
  image-name:
    description: Image name (used as ghcr.io/OWNER/realty-alerts/IMAGE-NAME)
    required: true

outputs:
  image-tag:
    description: The image tag that was pushed (e.g. sha-abc1234 or pr-42)
    value: ${{ steps.meta.outputs.version }}

runs:
  using: composite
  steps:
    - name: Log in to ghcr.io
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ github.token }}

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ghcr.io/${{ github.repository_owner }}/realty-alerts/${{ inputs.image-name }}
        tags: |
          type=sha,format=short
          type=ref,event=pr

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build and push
      uses: docker/build-push-action@v6
      with:
        context: ${{ inputs.context }}
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
