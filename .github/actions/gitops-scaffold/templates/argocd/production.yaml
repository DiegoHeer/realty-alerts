---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ${APP_NAME}-production
  namespace: argocd
spec:
  project: ${APP_NAME}
  source:
    repoURL: https://github.com/${CONFIG_REPO}.git
    targetRevision: main
    path: apps/${APP_NAME}/overlays/production
  destination:
    server: https://kubernetes.default.svc
    namespace: ${APP_NAME}-production
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
